<section class="home-hero">
  <div class="home-hero-art" aria-hidden="true">
    <div class="home-glow home-glow-top"></div>
    <div class="home-glow home-glow-bottom"></div>

    <svg class="home-waves" viewBox="0 0 390 844" preserveAspectRatio="none">
      <path class="home-wave home-wave-a"
        d="M-18 0 H258 C260 62 232 101 178 124 C126 146 91 143 74 204 C58 262 25 298 -18 316 Z" />
      <path class="home-wave home-wave-b"
        d="M32 0 H390 V78 C340 119 291 122 242 94 C188 62 142 55 96 92 C51 128 38 176 58 238 C74 291 48 329 -18 354 V0 Z" />
      <path class="home-wave home-wave-c"
        d="M-18 0 H132 C128 76 94 108 74 165 C54 222 66 271 24 309 C9 323 -6 333 -18 340 Z" />
      <path class="home-wave home-wave-d"
        d="M408 448 V844 H130 C138 774 171 742 234 724 C296 706 330 666 316 606 C302 545 338 495 408 448 Z" />
      <path class="home-wave home-wave-e"
        d="M408 554 V844 H34 C49 785 88 749 150 738 C219 725 243 678 230 621 C215 556 252 507 322 500 C358 497 386 516 408 554 Z" />
      <path class="home-wave home-wave-f"
        d="M408 642 V844 H184 C164 808 165 770 198 741 C238 707 300 712 319 654 C336 603 371 590 408 642 Z" />
    </svg>
  </div>

  <div class="home-brand">
    <img class="home-brand-mark" src="/logo.svg" alt="Lilies Shed" />
  </div>

  @if (!auth.currentUser()) {
  <div class="home-cta">
    <button class="home-google-sign-in-button" type="button" (click)="signIn()" [disabled]="auth.isBusy()">
      <svg class="home-google-sign-in-icon" viewBox="0 0 18 18" aria-hidden="true">
        <path fill="#4285f4"
          d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.72v2.26h2.92c1.7-1.57 2.68-3.88 2.68-6.62z" />
        <path fill="#34a853"
          d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.92-2.26c-.8.54-1.84.86-3.04.86-2.34 0-4.33-1.58-5.04-3.7H.94v2.33A9 9 0 0 0 9 18z" />
        <path fill="#fbbc05"
          d="M3.96 10.72A5.41 5.41 0 0 1 3.68 9c0-.6.1-1.18.28-1.72V4.95H.94A9 9 0 0 0 0 9c0 1.45.34 2.82.94 4.05l3.02-2.33z" />
        <path fill="#ea4335"
          d="M9 3.58c1.32 0 2.5.45 3.44 1.35l2.58-2.58C13.46.9 11.43 0 9 0A9 9 0 0 0 .94 4.95l3.02 2.33C4.67 5.16 6.66 3.58 9 3.58z" />
      </svg>
      <span>Sign in with Google</span>
    </button>
  </div>
  }
</section>
