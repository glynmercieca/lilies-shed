<section class="home-hero">
  <div class="home-hero-art" aria-hidden="true">
    <div class="home-glow home-glow-top"></div>
    <div class="home-glow home-glow-bottom"></div>

    <div class="home-line home-line-a"></div>
    <div class="home-line home-line-b"></div>
    <div class="home-line home-line-c"></div>
    <div class="home-line home-line-d"></div>
    <div class="home-line home-line-e"></div>

    <div class="home-shape home-shape-square"></div>
    <div class="home-shape home-shape-circle"></div>
    <div class="home-shape home-shape-diamond"></div>
    <div class="home-shape home-shape-ring"></div>
    <div class="home-shape home-shape-pill"></div>
    <div class="home-shape home-shape-dot"></div>

    <div class="home-brand">
      <img class="home-brand-mark" src="/logo.svg" alt="Lilies Shed" />
    </div>
  </div>

  @if (!auth.currentUser()) {
  <div class="home-cta">
    <button mat-flat-button class="home-sign-in-button" (click)="signIn()" [disabled]="auth.isBusy()">
      <mat-icon class="material-symbols-outlined">login</mat-icon>
      Sign in with Google
    </button>
  </div>
  }
</section>
