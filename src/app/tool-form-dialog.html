<h2 mat-dialog-title>{{ data.mode === 'add' ? 'Add tool' : 'Edit tool' }}</h2>
<mat-dialog-content>
  <form [formGroup]="form">
    <mat-form-field appearance="outline">
      <mat-label>Name</mat-label>
      <input matInput formControlName="name" />
      @if (form.controls.name.invalid && form.controls.name.touched) {
        <mat-error>Name is required.</mat-error>
      }
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Description</mat-label>
      <textarea matInput rows="4" formControlName="description"></textarea>
      @if (form.controls.description.invalid && form.controls.description.touched) {
        <mat-error>Description is required.</mat-error>
      }
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Notes</mat-label>
      <textarea matInput rows="3" formControlName="notes"></textarea>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Images</mat-label>
      <textarea
        matInput
        rows="3"
        formControlName="images"
        placeholder="Paste image URLs separated by commas or line breaks"
      ></textarea>
    </mat-form-field>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>Cancel</button>
  <button mat-flat-button (click)="submit()">
    {{ data.mode === 'add' ? 'Add tool' : 'Save changes' }}
  </button>
</mat-dialog-actions>
