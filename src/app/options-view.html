<section class="options-page d-flex flex-column">
  <header class="d-grid gap-1 mb-3">
    <h1 class="m-0 d-flex align-items-center gap-2">
      <mat-icon class="material-symbols-outlined">action_key</mat-icon>
      <span>Options</span>
    </h1>
    <p class="m-0 text-body-secondary">App settings and quick actions.</p>
  </header>

  <div class="d-grid gap-3">
    <button mat-button type="button" class="option-block" (click)="toggleTheme()">
      <mat-icon class="material-symbols-outlined">{{ themeIcon }}</mat-icon>
      <span>Theme</span>
    </button>

    <button mat-button type="button" class="option-block" (click)="requestTool()">
      <mat-icon class="material-symbols-outlined">tools_power_drill</mat-icon>
      <span>Request a tool</span>
    </button>

    <button mat-button type="button" class="option-block" (click)="requestNotificationPermission()">
      <mat-icon class="material-symbols-outlined">notifications</mat-icon>
      <span>Enable notifications</span>
    </button>

    <button mat-button type="button" class="option-block" (click)="refresh()" [disabled]="isRefreshing()">
      <mat-icon class="material-symbols-outlined">refresh</mat-icon>
      <span>Reload application</span>
    </button>

    <button mat-button type="button" class="option-block" (click)="signOut()">
      <mat-icon class="material-symbols-outlined">logout</mat-icon>
      <span>Sign out</span>
    </button>
  </div>

  <div class="options-version mt-auto pt-4 text-body-secondary small mx-auto">
    Version {{ version }}
  </div>
</section>
