@if (loading() && isSignedIn()) {
  <mat-progress-bar mode="indeterminate"></mat-progress-bar>
}

<main class="page-shell">
  <div class="shell-actions">
    @if (isSignedIn()) {
      <button mat-icon-button type="button" (click)="refresh()" [disabled]="loading()" aria-label="Refresh data">
        <mat-icon>refresh</mat-icon>
      </button>
      <button mat-icon-button type="button" (click)="signOut()" aria-label="Sign out">
        <mat-icon>logout</mat-icon>
      </button>
    } @else {
      <a mat-button routerLink="/home" routerLinkActive="active-link" [routerLinkActiveOptions]="{ exact: true }">Home</a>
      <a mat-button routerLink="/about" routerLinkActive="active-link" [routerLinkActiveOptions]="{ exact: true }">About</a>
      <a mat-button routerLink="/privacy" routerLinkActive="active-link" [routerLinkActiveOptions]="{ exact: true }">Privacy</a>
    }
  </div>
  <section class="section-layout">
    <router-outlet></router-outlet>
  </section>
</main>

@if (isSignedIn()) {
  <nav class="bottom-nav">
    <a
      mat-button
      routerLink="/tools"
      routerLinkActive="active-nav"
      [routerLinkActiveOptions]="{ exact: true }"
    >
      <mat-icon>construction</mat-icon>
      Shed
    </a>
    <a
      mat-button
      routerLink="/borrowed"
      routerLinkActive="active-nav"
      [routerLinkActiveOptions]="{ exact: true }"
    >
      <mat-icon>assignment_returned</mat-icon>
      Borrowed
    </a>
    <a
      mat-button
      routerLink="/my-tools"
      routerLinkActive="active-nav"
      [routerLinkActiveOptions]="{ exact: true }"
    >
      <mat-icon>inventory_2</mat-icon>
      My Tools
    </a>
  </nav>
}
